<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Ethereal Art Photography | Ami Gautier</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/ethereal" />
    <!--favicon buscador-->
    <link rel="shortcut icon" href="images/logotipo/favicon.png">
    <!--Description-->
    <meta name="description"
        content="A series of projects created in forests, rivers, and landscapes, where each image explores the relationship between the external world and the inner world." />
    <!--Hoja de estilos-->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/portfolio.css" />
    <!--Link js para abrir menú-->
    <script src="js/header.js" defer></script>
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="fonts/icofont.min.css">
    <!--Actualizar año-->
    <script>
        var fechaActual = new Date();
        var añoActual = fechaActual.getFullYear();
        var actualizarfecha = añoActual;
    </script>
    <!--Bloquear clic derecho-->
    <script type="text/javascript">
        document.oncontextmenu = function () {
            return false;
        };
    </script>
</head>

<body>
    <h1 class="seo-hidden">Ethereal Art Photography by Ami Gautier</h1>
    <!--Header-->
    <div>
        <div id="header-placeholder"></div>
    </div>

    <!--Main-->
    <main>

        <section class="contenedor_portfolio">
            <!-- Texto lateral -->
            <div class="texto-izquierda">ETHEREAL</div>
            <div class="texto-derecha">artworks</div>

            <!-- Galería -->
            <section class="galeria">

                <div class="card">
                    <a href="works/nostos">
                        <img src="images/ethereal/nostos-card.webp" loading="lazy" alt="Hombre sentado en una cascada con las manos en el rostro">
                        <p>NOSTOS</p>
                    </a>
                </div>

                <div class="card">
                    <a href="works/shallow">
                        <img src="images/ethereal/shallow-card.webp" loading="lazy" alt="Hombre acostado al lado de un lago">
                        <p>SHALLOW</p>
                    </a>
                </div>

                <div class="card">
                    <a href="works/reflection">
                        <img src="images/ethereal/reflection-card.webp" loading="lazy" alt="Hombre en medio de un lago, con las manos en el rostro">
                        <p>REFLECTION ON THE WATER</p>
                    </a>
                </div>

                <div class="card">
                    <a href="works/thegreen">
                        <img src="images/ethereal/green-card.webp" loading="lazy" alt="Hombre en medio de un bosque de bambú, sentado en medio de hojas de árbol">
                        <p>THE GREEN NOSTALGIA</p>
                    </a>
                </div>

            </section>
        </section>

    </main>

    <!--Footer-->
    <div>
        <div id="footer-placeholder"></div>
    </div>


    <!--Javascript-->
    <script src="js/date.js"></script>
    <script src="includes.js"></script>
    <script src="js/header.js"></script>

</body>

</html>
