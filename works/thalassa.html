<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Thalassa | Product Photography by Ami Gautier</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/works/thalassa" />
    <!--Description-->
    <meta name="description" content="Thalassa, a product photography series by Ami Gautier exploring luxury objects through water, reflection and deep atmospheric composition." />
    <!--favicon buscador-->
    <link rel="icon" type=”image/png” href="../images/logotipo/favicon.png" />
    <!--Link hoja de estilos-->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/works.css">
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="../fonts/icofont.min.css">

    <!--Actualizar año-->
    <script>
        var fechaActual = new Date();
        var añoActual = fechaActual.getFullYear();
        var actualizarfecha = añoActual;
    </script>
    <!--Bloquear clic derecho-->
    <script type="text/javascript">
        document.oncontextmenu = function () {
            return false;
        };
    </script>
</head>

<body>
    <h1 class="seo-hidden">Thalassa Product Photography by Ami Gautier</h1>
    <!--Main-->
    <main>
        <section class="galeria_porfolio">
            <section class="seccion-hero" id="inicio">

                <img src="../images/works/product/thalassa/thalassa_banner.webp"
                    alt="Fotografía de un perfume en agua de color verde" class="hero-imagen">

                <div class="hero-capa"></div>

                <div class="hero-texto">
                    <h1 class="hero-titulo">Thalassa</h1>
                    <p class="hero-subtitulo">The spirit of the deep sea</p>
                </div>

            </section>


            <section class="seccion-contenido" id="galeria">

                <div class="bloque-texto">
                    <span class="texto-superior">PORTFOLIO</span>
                    <p class="titulo-seccion">PRODUCT</p>
                    <p class="parrafo-seccion">
                        Thalassa explores product form through water, reflection and depth — where light moves with
                        quiet precision
                    </p>
                </div>

                <div class="galeria-grid">

                    <img src="../images/works/product/thalassa/thalassa1.webp" class="imagen-grid grande" loading="lazy" 
                        alt="Fotografía de un perfume en agua de color verde">
                    <img src="../images/works/product/thalassa/thalassa2.webp" class="imagen-grid" loading="lazy" 
                        alt="Fotografía de un perfume en agua de color azul y con la tapa a un lado">
                    <img src="../images/works/product/thalassa/thalassa5.webp"
                        class="imagen-grid imagen-grid-ancho ancho" loading="lazy" 
                        alt="Fotografía de un collar con perlas azules, en un estanque de agua">
                    <img src="../images/works/product/thalassa/thalassa3.webp" class="imagen-grid" loading="lazy" 
                        alt="Fotografía de un extintor de color rojo salpicado por agua">
                    <img src="../images/works/product/thalassa/thalassa4.webp" class="imagen-grid" loading="lazy" 
                        alt="Fotografía de un flotador de redondo de color naranja, salpicado por agua">


                </div>

                <div class="contenedor-boton">
                    <a href="#" class="boton-back" id="boton_back">Back</a>
                </div>

                <div class="footer-portfolio">

                    <p class="texto-copyright">
                        © Copyright
                        <script>document.write(actualizarfecha)</script>
                        Ami Gautier. <br> All Rights Reserved.
                    </p>

                    <div class="linea-footer"></div>

                    <div class="redes-footer">

                        <a class="icofont-behance icono-red" href="https://www.behance.net/amigautier"
                            target="_blank"></a>

                        <a class="icofont-instagram icono-red" href="https://www.instagram.com/amigautier"
                            target="_blank"></a>

                        <a class="icofont-share icono-red" href="https://wa.me/?text=https://amigautier.page.dev"
                            target="_blank"></a>

                    </div>

                </div>

            </section>
        </section>
    </main>

    <!--Ja-->
    <script src="../js/back.js"></script>
</body>

</html>
