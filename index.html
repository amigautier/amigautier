<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Ami Gautier: Photographer</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/" />
    <!--Description-->
    <meta name="description"
        content="Ami Gautier is a photographer and artist known for his nostalgic and poetic style, creating a mystical atmosphere that manages to immerse the viewer." />
    <!--favicon buscador-->
    <link rel="icon" type=”image/png” href="images/logotipo/favicon.png" />
    <!--Link hoja de estilos-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/main_index.css">
    <!--Link js para abrir menú-->
    <script defer src="js/header.js"></script>
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="fonts/icofont.min.css">
    <!--Bloquear clic derecho-->
    <script type="text/javascript">
        document.oncontextmenu = function () {
            return false;
        };
    </script>
</head>

<body>
    <!--Header-->
    <div>
        <div id="header-placeholder"></div>
    </div>

    <!--Main-->
    <main>
        <!--Banner-->
        <section class="banner_main" id="banner">
            <div class="image_banner">
                <img src="images/banner/banner.webp" alt="Editorial photography of artistic makeup in dark blue colors">
            </div>
        </section>

        <!--Tarjetas-->
        <section class="seccion-tarjetas" id="tarjetas">
            <article class="titulo_seccion_tarjetas">
                <p>
                    <span class="my">Selected</span><br>
                    <span class="work">Works</span>
                </p>
            </article>
            <div class="contenedor-tarjetas">

                <article class="tarjeta">
                    <img src="images/cards/evania.webp"
                        alt="Fotografía editorial de mujer con saco rojo y maquillaje ahumado rojo"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Evania</p>
                        <a href="works/evania?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/aevum.webp"
                        alt="Fotografía beauty de mujer de cabello corto con maquillaje azul" class="tarjeta-imagen"
                        id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Aevum</p>
                        <a href="works/aevum?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/drusila.webp"
                        alt="Fotografía editorial con fondo vinotinto y una mujer vestida con chaqueta de cuero"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Drusila</p>
                        <a href="works/drusila?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/ravena.webp"
                        alt="Fotografía editorial de mujer traje de peluza y maquillake ahumado y fondo vinotinto"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Ravena</p>
                        <a href="works/ravena?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/velaris.webp"
                        alt="Fotografía editorial de mujer con saco verde y gafas en forma de corazón"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Velaris</p>
                        <a href="works/velaris?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/androgina.webp"
                        alt="Fotografía editorial de fondo azul oscuro, mujer con maquillaje azul y guantes de cuero"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Androgina</p>
                        <a href="works/androgina?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/noctara.webp"
                        alt="Fotografía editorial de mujer con vestido de escamas plateadas" class="tarjeta-imagen"
                        id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Noctara</p>
                        <a href="works/noctara?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <video class="tarjeta-video" id="tarjeta_imagen" autoplay muted loop playsinline
                        poster="images/cards/luneth-image.webp">
                        <source src="images/cards/luneth.mp4" type="video/mp4">
                    </video>
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Luneth</p>
                        <a href="works/luneth?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/lumora.webp"
                        alt="Fotografía editorial de una pareja dandose la espalda en mitad de la calle"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Lumora</p>
                        <a href="works/lumora?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>



                <article class="tarjeta">
                    <img src="images/cards/sylvara.webp"
                        alt="Reloj plteado con esfera verde oscuro, en un palo de madera" class="tarjeta-imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Sylvara</p>
                        <a href="works/sylvara?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/talvyr.webp"
                        alt="Fotografía editorial mujer maquilada como la pelicula la Novia de Jack"
                        class="tarjeta-imagen" id="tarjeta_imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Talvyr</p>
                        <a href="works/talvyr?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

                <article class="tarjeta">
                    <img src="images/cards/thalassa.webp"
                        alt="Fotografía de producto de un perfume en un estanque de agua" class="tarjeta-imagen">
                    <div class="tarjeta-contenido">
                        <p class="tarjeta-texto">Thalassa</p>
                        <a href="works/thalassa?from=index" class="tarjeta-boton">View</a>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <!--Footer-->
    <div>
        <div id="footer-placeholder"></div>
    </div>

    <!--JavaScript-->
    <script src="js/date.js"></script>
    <script src="includes.js"></script>
    <script src="js/header.js"></script>

</body>

</html>
