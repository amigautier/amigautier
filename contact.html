<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Contact | Ami Gautier</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/contact" />
    <!--favicon buscador-->
    <link rel="shortcut icon" href="images/logotipo/favicon.png">
    <!--Description-->
    <meta name="description"
        content="Contact Ami Gautier for editorial, beauty and product photography. Email: amigautier@gmail.com" />
    <!--Keywords-->
    <meta name="keywords" content="Contact photographer Ami Gautier" />
    <!--Hoja de estilos-->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <!--Link js para abrir menú-->
    <script src="js/header.js" defer></script>
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="fonts/icofont.min.css">
    <!--Actualizar año-->
    <script>
        var fechaActual = new Date();
        var añoActual = fechaActual.getFullYear();
        var actualizarfecha = añoActual;
    </script>
</head>

<body class="home">
    <h1 class="seo-hidden">Contact Ami Gautier Photography</h1>
    <!--Header-->
    <div>
        <div id="header-placeholder"></div>
    </div>

    <!--Main-->
    <main>
        <!--Formulario-->
        <section class="contact-section">

            <div class="contact-image">
                <img src="images/about/about-1.jpg" alt="Contact image">
            </div>

            <div class="contact-content">

                <form class="contact-form" id="contactForm">

                    <h1>Let’s connect ⸙</h1>

                    <div class="name-row">

                        <div class="input-group">
                            <label for="firstName">
                                First Name
                            </label>
                            <input type="text" name="firstName" required maxlength="20">
                        </div>

                        <div class="input-group">
                            <label for="lastName">
                                Last Name
                            </label>
                            <input type="text" name="lastName" required maxlength="20">
                        </div>

                    </div>

                    <div class="input-group">
                        <label for="email">
                            Email <span>(required)</span>
                        </label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="subject">
                            Subject
                        </label>
                        <input type="text" name="subject" required maxlength="100">
                    </div>

                    <div class="input-group">
                        <label for="Message">
                            Message <span>(required)</span>
                        </label>
                        <textarea name="message" required maxlength="1000"></textarea>
                    </div>

                    <button type="submit">
                        Submit
                    </button>

                    <div id="formResponse" class="hidden"></div>

                </form>

            </div>

        </section>
    </main>

    <!--Footer-->
    <div>
        <div id="footer-placeholder"></div>
    </div>


    <!--Javascript-->
    <script src="js/date.js"></script>
    <script src="includes.js"></script>
    <script src="js/header.js"></script>
    <script src="js/contact.js"></script>

</body>

</html>
