<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Atmospheric Photography | Ami Gautier</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/atmospheric" />
    <!--Description-->
    <meta name="description" content="Atmospheric photography by Ami Gautier. Conceptual and artistic visual work exploring nature, form and emotion." />
    <!--favicon buscador-->
    <link rel="shortcut icon" href="images/logotipo/favicon.png">
    <!--Hoja de estilos-->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/atmospheric.css">
    <!--Link js para abrir menú-->
    <script src="js/header.js" defer></script>
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="fonts/icofont.min.css">
    <!--Deslizar tactil-->
    <script src="js/swiped-events.min.js"></script>
    <!--Actualizar año-->
    <script>
        var fechaActual = new Date();
        var añoActual = fechaActual.getFullYear();
        var actualizarfecha = añoActual;
    </script>
    <!--Bloquear clic derecho-->
    <script type="text/javascript">
        document.oncontextmenu = function () {
            return false;
        };
    </script>
</head>

<body>
    <h1 class="seo-hidden">Fine Art Photography by Ami Gautier</h1>
    <!--Header-->
    <div>
        <div id="header-placeholder"></div>
    </div>

    <!--Main-->
    <main>
        <div class="contenedor_atmospheric">
            <div class="carrusel_scroll">

                <div class="cont_carrusel_scroll">
                    <h2>Gallery</h2>
                    <img class="carrusel_img" id="sbutton1" src="images/atmospheric/17.webp"
                        alt="Black and white photograph of man with butterflies on hands and head." loading="lazy">
                    <img class="carrusel_img" id="sbutton2" src="images/atmospheric/7.webp"
                        alt="Black and white photograph of an entity covered by a robe, seated on a chair, in front of which hands hold an open book from which butterflies are emerging."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton3" src="images/atmospheric/1.webp"
                        alt="Black and white photograph of a nun in front of a giant window, holding a candle, surrounded by butterflies."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton4" src="images/atmospheric/4.webp"
                        alt="Black and white portrait photograph of a man wearing a tunic on his head, with his eyes closed and a chain in his hands."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton5" src="images/atmospheric/5.webp"
                        alt="Black and white photograph of a man with his face completely covered by a blanket."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton6" src="images/atmospheric/6.webp"
                        alt="Black and white photograph of man with tunic on his face and a chain in his hand."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton7" src="images/atmospheric/8.webp"
                        alt="Black and white photograph of a nun covering her face with her hands." loading="lazy">
                    <img class="carrusel_img" id="sbutton8" src="images/atmospheric/9.webp"
                        alt="Black and white photograph nun screaming in despair." loading="lazy">
                    <img class="carrusel_img" id="sbutton9" src="images/atmospheric/10.webp"
                        alt="Black and white photograph of a nun covering her face with one hand and an open bible in the other hand."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton10" src="images/atmospheric/11.webp"
                        alt="Black and white photograph of a man coming out of some canvases that are in the air."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton11" src="images/atmospheric/13.webp"
                        alt="Black and white photograph of a man praying with a robe on his face and a chain in his hands."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton12" src="images/atmospheric/14.webp"
                        alt="Black and white photograph of a man with a tunic on his head, praying with his hands on his face."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton13" src="images/atmospheric/15.webp"
                        alt="Black and white photograph of praying man wearing a tunic, looking towards the sky."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton14" src="images/atmospheric/2.webp"
                        alt="Black and white photograph nun in front of a giant window, holding an owl in her hand."
                        loading="lazy">
                    <img class="carrusel_img" id="sbutton15" src="images/atmospheric/3.webp"
                        alt="Black and white photograph nun in front of a giant window praying." loading="lazy">
                    <img class="carrusel_img" id="sbutton16" src="images/atmospheric/16.webp"
                        alt="Black and white photograph of man behind canvases that are in the air." loading="lazy">
                    <img class="carrusel_img" id="sbutton17" src="images/atmospheric/12.webp"
                        alt="Black and white photograph of a man looking at the camera behind some fabrics that are in the air."
                        loading="lazy">

            </div>

            <div class="textocarrusel">
                <h2>Whispers in Black & White</h2>
                <p>The silent language of images</p>

                <div id="contenedor-lightbox">
                    <img id="img-activa" src="" alt="Foto principal de lightboxs">
                    <button id="btn-cierra" type="button">x</button>
                    <button id="btn-retrocede" type="button">&lt;</button>
                    <button id="btn-adelanta" type="button">&gt;</button>
                </div>
            </section>

        </div>
    </main>

    <!--Footer-->
    <div>
        <div id="footer-placeholder"></div>
    </div>

    <!--Javascript-->
    <script src="js/date.js"></script>
    <script src="includes.js"></script>
    <script src="js/header.js"></script>
    <script src="js/lightbox.js"></script>

</html>
