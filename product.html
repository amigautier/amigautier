<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Product Photography Portfolio | Ami Gautier</title>
    <!--Etiqueta Canonical-->
    <link rel="canonical" href="https://amigautier.pages.dev/product" />
    <!--favicon buscador-->
    <link rel="shortcut icon" href="images/logotipo/favicon.png">
    <!--Description-->
    <meta name="description" content="Product photography portfolio by Ami Gautier. Refined visual work focused on luxury, texture, lighting and composition for commercial and editorial brands." />
    <!--Hoja de estilos-->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/portfolio.css" />
    <!--Link js para abrir menú-->
    <script src="js/header.js" defer></script>
    <!--Link logos redes sociales-->
    <link rel="stylesheet" href="fonts/icofont.min.css">
    <!--Actualizar año-->
    <script>
        var fechaActual = new Date();
        var añoActual = fechaActual.getFullYear();
        var actualizarfecha = añoActual;
    </script>
</head>

<body>
    <h1 class="seo-hidden">Luxury Product Photography by Ami Gautier</h1>
    <!--Header-->
    <div>
        <div id="header-placeholder"></div>
    </div>

    <!--Main-->
    <main>

        <section class="contenedor_portfolio">
            <!-- Texto lateral -->
            <div class="texto-izquierda">PRODUCT</div>
            <div class="texto-derecha">studio</div>

            <!-- Galería -->
            <section class="galeria">

                <div class="card">
                    <a href="works/sylvara?from=product">
                        <img src="images/cards/sylvara.webp" loading="lazy" 
                            alt="Fotografía editorial de mujer con saco verde y gafas en forma de corazón">
                        <p>SYLVARA</p>
                    </a>
                </div>

                <div class="card">
                    <a href="works/luneth?from=product">
                        <video class="tarjeta-video" id="tarjeta_imagen" autoplay muted loop playsinline
                            poster="images/cards/luneth-image.webp">
                            <source src="images/cards/luneth.mp4" type="video/mp4">
                        </video>
                        <p>LUNETH</p>
                    </a>
                </div>

                <div class="card">
                    <a href="works/thalassa?from=product">
                        <img src="images/cards/thalassa.webp" loading="lazy" 
                            alt="Fotografía beauty de mujer de cabello corto con maquillaje azul">
                        <p>THALASSA</p>
                    </a>
                </div>

            </section>
        </section>

    </main>

    <!--Footer-->
    <div>
        <div id="footer-placeholder"></div>
    </div>


    <!--Javascript-->
    <script src="js/date.js"></script>
    <script src="includes.js"></script>
    <script src="js/header.js"></script>

</body>

</html>
